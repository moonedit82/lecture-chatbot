<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인간행동과 사회환경 Q&A</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #e60023;
      --red-hover: #cc001f;
      --plum: #211922;
      --olive: #62625b;
      --silver: #91918c;
      --sand: #e5e5e0;
      --warm-light: #e0e0d9;
      --fog: #f6f6f3;
      --white: #ffffff;
      --radius-btn: 16px;
      --radius-card: 20px;
      --radius-lg: 28px;
      --font: -apple-system, system-ui, 'Segoe UI', Roboto, 'Noto Sans KR', 'Helvetica Neue', Arial, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--white);
      color: var(--plum);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Header ─── */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--sand);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: var(--red);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo svg {
      width: 22px;
      height: 22px;
      fill: var(--white);
    }

    header .title-group h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--plum);
      letter-spacing: -0.5px;
    }

    header .title-group p {
      font-size: 12px;
      color: var(--olive);
      margin-top: 1px;
    }

    /* ─── Chat Area ─── */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }

    /* ─── Welcome Card ─── */
    .welcome-card {
      background: var(--fog);
      border-radius: var(--radius-lg);
      padding: 32px 24px;
      text-align: center;
    }

    .welcome-icon {
      width: 56px;
      height: 56px;
      background: var(--red);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 28px;
    }

    .welcome-card h2 {
      font-size: 28px;
      font-weight: 700;
      color: var(--plum);
      letter-spacing: -1.2px;
      margin-bottom: 8px;
    }

    .welcome-card p {
      color: var(--olive);
      font-size: 14px;
      line-height: 1.5;
    }

    .example-questions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }

    .example-btn {
      background: var(--sand);
      color: var(--plum);
      border: none;
      border-radius: var(--radius-btn);
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      font-family: var(--font);
    }

    .example-btn:hover {
      background: var(--warm-light);
    }

    /* ─── Messages ─── */
    .message {
      display: flex;
      gap: 10px;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .message.bot .avatar {
      background: var(--red);
      color: var(--white);
      font-size: 18px;
    }

    .message.user .avatar {
      background: var(--sand);
    }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      font-size: 15px;
      line-height: 1.6;
    }

    .message.bot .bubble {
      background: var(--fog);
      color: var(--plum);
      border-radius: 4px var(--radius-card) var(--radius-card) var(--radius-card);
    }

    .message.user .bubble {
      background: var(--red);
      color: var(--white);
      border-radius: var(--radius-card) 4px var(--radius-card) var(--radius-card);
    }

    .bubble strong { font-weight: 700; }

    .bubble table {
      border-collapse: collapse;
      margin: 8px 0;
      font-size: 13px;
      width: 100%;
    }

    .bubble th, .bubble td {
      border: 1px solid var(--sand);
      padding: 6px 10px;
      text-align: left;
    }

    .bubble th {
      background: var(--sand);
      font-weight: 600;
    }

    /* ─── Typing Indicator ─── */
    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 4px 0;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: var(--silver);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ─── Input Area ─── */
    #input-area {
      background: var(--white);
      border-top: 1px solid var(--sand);
      padding: 16px 16px 12px;
    }

    #input-form {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
    }

    #user-input {
      flex: 1;
      padding: 11px 15px;
      border: 1px solid var(--silver);
      border-radius: var(--radius-btn);
      font-size: 15px;
      font-family: var(--font);
      color: var(--plum);
      outline: none;
      transition: border-color 0.2s;
      resize: none;
      height: 46px;
      background: var(--white);
    }

    #user-input::placeholder { color: var(--silver); }
    #user-input:focus { border-color: var(--red); }

    #send-btn {
      padding: 6px 20px;
      background: var(--red);
      color: var(--white);
      border: none;
      border-radius: var(--radius-btn);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
      font-family: var(--font);
    }

    #send-btn:hover { background: var(--red-hover); }
    #send-btn:disabled { background: var(--silver); cursor: not-allowed; }

    .hint {
      text-align: center;
      color: var(--silver);
      font-size: 12px;
      margin-top: 6px;
    }

    /* ─── Scrollbar ─── */
    #chat-container::-webkit-scrollbar { width: 6px; }
    #chat-container::-webkit-scrollbar-track { background: transparent; }
    #chat-container::-webkit-scrollbar-thumb {
      background: var(--sand);
      border-radius: 3px;
    }

    /* ─── Responsive ─── */
    @media (max-width: 576px) {
      .welcome-card { padding: 24px 16px; }
      .welcome-card h2 { font-size: 22px; }
      .bubble { max-width: 85%; }
      .example-btn { font-size: 12px; padding: 6px 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14h2v2h-2v-2zm0-10h2v8h-2V6z"/></svg>
  </div>
  <div class="title-group">
    <h1>인간행동과 사회환경 Q&A</h1>
    <p>2025-1학기 강의 자료 기반 질문 답변</p>
  </div>
</header>

<div id="chat-container">
  <div class="welcome-card">
    <div class="welcome-icon">📚</div>
    <h2>무엇이 궁금하세요?</h2>
    <p>강의 자료를 바탕으로 답변해 드립니다.<br>자료에 없는 내용은 솔직하게 안내합니다.</p>
    <div class="example-questions">
      <button class="example-btn" onclick="setQuestion('정신분석학적 접근의 핵심 개념은?')">정신분석학적 접근의 핵심 개념은?</button>
      <button class="example-btn" onclick="setQuestion('에릭슨의 발달 단계를 설명해줘')">에릭슨의 발달 단계를 설명해줘</button>
      <button class="example-btn" onclick="setQuestion('매슬로우의 욕구위계이론이란?')">매슬로우의 욕구위계이론이란?</button>
      <button class="example-btn" onclick="setQuestion('행동주의 이론의 특징은?')">행동주의 이론의 특징은?</button>
    </div>
  </div>
</div>

<div id="input-area">
  <form id="input-form" onsubmit="sendMessage(event)">
    <textarea id="user-input" placeholder="강의 자료에 대해 질문해 주세요..." rows="1"
      onkeydown="handleKey(event)"></textarea>
    <button type="submit" id="send-btn">전송</button>
  </form>
  <p class="hint">Enter로 전송 · Shift+Enter로 줄바꿈</p>
</div>

<script>
  function setQuestion(q) {
    document.getElementById('user-input').value = q;
    document.getElementById('user-input').focus();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(e);
    }
  }

  function addMessage(role, text) {
    const container = document.getElementById('chat-container');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const avatar = role === 'bot' ? '\uD83D\uDCD6' : '\uD83D\uDC64';
    div.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div class="bubble" id="msg-${Date.now()}">${text}</div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div.querySelector('.bubble');
  }

  function addTyping() {
    const container = document.getElementById('chat-container');
    const div = document.createElement('div');
    div.className = 'message bot';
    div.id = 'typing-msg';
    div.innerHTML = `
      <div class="avatar">&#128214;</div>
      <div class="bubble">
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      </div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  async function sendMessage(e) {
    e.preventDefault();
    const input = document.getElementById('user-input');
    const message = input.value.trim();
    if (!message) return;

    input.value = '';
    input.style.height = '46px';

    addMessage('user', escapeHtml(message));

    const sendBtn = document.getElementById('send-btn');
    sendBtn.disabled = true;

    const typingEl = addTyping();

    try {
      const response = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, api_key: '' })
      });

      if (!response.ok) {
        const err = await response.json();
        typingEl.remove();
        addMessage('bot', 'Error: ' + (err.error || ''));
        return;
      }

      typingEl.remove();
      const botBubble = addMessage('bot', '');
      botBubble.innerHTML = '';

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let fullText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        const lines = chunk.split('\n');
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            const data = line.slice(6);
            if (data === '[DONE]') break;
            fullText += data.replace(/\\n/g, '\n');
            botBubble.innerHTML = marked(fullText);
            document.getElementById('chat-container').scrollTop = 99999;
          }
        }
      }

    } catch (err) {
      typingEl.remove();
      addMessage('bot', '연결 오류가 발생했습니다. 서버를 확인해주세요.');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function marked(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/\|(.+)\|/g, function(match) {
        const cells = match.split('|').filter(c => c.trim());
        if (cells.every(c => c.trim().match(/^[-:]+$/))) return '';
        const tag = match.includes('---') ? 'th' : 'td';
        return '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
      })
      .replace(/((<tr>.*<\/tr>\s*)+)/g, '<table>$1</table>')
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>')
      .replace(/^#{1,3}\s(.+)$/gm, '<strong>$1</strong><br>');
  }
</script>

</body>
</html>
