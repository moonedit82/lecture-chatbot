<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인간행동과 사회환경 Q&A 챗봇</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f7fa;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #2c5282;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    header .icon { font-size: 28px; }

    header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    header p {
      font-size: 12px;
      opacity: 0.75;
      margin-top: 2px;
    }

    #api-key-bar {
      display: none;
    }

    #api-key-bar label {
      font-size: 13px;
      color: #5d4037;
      white-space: nowrap;
    }

    #api-key-input {
      flex: 1;
      max-width: 400px;
      padding: 6px 10px;
      border: 1px solid #ffca28;
      border-radius: 6px;
      font-size: 13px;
      font-family: monospace;
    }

    #api-key-save {
      padding: 6px 14px;
      background: #f9a825;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    #api-key-save:hover { background: #e65100; }

    #api-key-status {
      font-size: 12px;
      color: #388e3c;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }

    .message {
      display: flex;
      gap: 12px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .message.bot .avatar { background: #2c5282; }
    .message.user .avatar { background: #e2e8f0; }

    .bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.65;
    }

    .message.bot .bubble {
      background: white;
      color: #2d3748;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border-radius: 4px 12px 12px 12px;
    }

    .message.user .bubble {
      background: #2c5282;
      color: white;
      border-radius: 12px 4px 12px 12px;
    }

    .bubble .source-tag {
      display: inline-block;
      background: #ebf4ff;
      color: #2b6cb0;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 12px;
      margin-bottom: 6px;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 6px 0;
    }

    .typing-indicator span {
      width: 8px; height: 8px;
      background: #a0aec0;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    #input-area {
      background: white;
      border-top: 1px solid #e2e8f0;
      padding: 16px 24px;
    }

    #input-form {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
    }

    #user-input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
      height: 48px;
      font-family: inherit;
    }

    #user-input:focus { border-color: #2c5282; }

    #send-btn {
      padding: 0 20px;
      background: #2c5282;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #send-btn:hover { background: #1a365d; }
    #send-btn:disabled { background: #a0aec0; cursor: not-allowed; }

    .hint {
      text-align: center;
      color: #a0aec0;
      font-size: 13px;
      margin-top: 8px;
    }

    .welcome-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      text-align: center;
    }

    .welcome-card h2 {
      color: #2c5282;
      font-size: 20px;
      margin-bottom: 8px;
    }

    .welcome-card p {
      color: #718096;
      font-size: 14px;
      line-height: 1.6;
    }

    .example-questions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 16px;
    }

    .example-btn {
      background: #ebf4ff;
      color: #2c5282;
      border: 1px solid #bee3f8;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .example-btn:hover {
      background: #2c5282;
      color: white;
    }
  </style>
</head>
<body>

<header>
  <div class="icon">📚</div>
  <div>
    <h1>인간행동과 사회환경 Q&A 챗봇</h1>
    <p>2025년 1학기 강의 자료 기반 질문 답변 시스템</p>
  </div>
</header>

<div id="api-key-bar">
  <label>🔑 API 키:</label>
  <input type="password" id="api-key-input" placeholder="sk-ant-... 입력">
  <button id="api-key-save" onclick="saveApiKey()">저장</button>
  <span id="api-key-status"></span>
</div>

<div id="chat-container">
  <div class="welcome-card">
    <h2>안녕하세요! 👋</h2>
    <p>강의 자료에 대해 궁금한 점을 질문해 주세요.<br>
    자료에 있는 내용만 답변드리며, 없는 내용은 솔직하게 안내합니다.</p>
    <div class="example-questions">
      <button class="example-btn" onclick="setQuestion('정신분석학적 접근의 핵심 개념은?')">정신분석학적 접근의 핵심 개념은?</button>
      <button class="example-btn" onclick="setQuestion('에릭슨의 발달 단계를 설명해줘')">에릭슨의 발달 단계를 설명해줘</button>
      <button class="example-btn" onclick="setQuestion('매슬로우의 욕구위계이론이란?')">매슬로우의 욕구위계이론이란?</button>
      <button class="example-btn" onclick="setQuestion('행동주의 이론의 특징은?')">행동주의 이론의 특징은?</button>
    </div>
  </div>
</div>

<div id="input-area">
  <form id="input-form" onsubmit="sendMessage(event)">
    <textarea id="user-input" placeholder="강의 자료에 대해 질문해 주세요..." rows="1"
      onkeydown="handleKey(event)"></textarea>
    <button type="submit" id="send-btn">전송 ↑</button>
  </form>
  <p class="hint">Enter로 전송 · Shift+Enter로 줄바꿈</p>
</div>

<script>
  let apiKey = localStorage.getItem('apiKey') || '';

  // API 키 초기 표시
  if (apiKey) {
    document.getElementById('api-key-input').value = apiKey;
    document.getElementById('api-key-status').textContent = '✅ 저장됨';
  }

  function saveApiKey() {
    apiKey = document.getElementById('api-key-input').value.trim();
    if (apiKey) {
      localStorage.setItem('apiKey', apiKey);
      document.getElementById('api-key-status').textContent = '✅ 저장됨';
    }
  }

  function setQuestion(q) {
    document.getElementById('user-input').value = q;
    document.getElementById('user-input').focus();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(e);
    }
  }

  function addMessage(role, text) {
    const container = document.getElementById('chat-container');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const avatar = role === 'bot' ? '🤖' : '👤';
    div.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div class="bubble" id="msg-${Date.now()}">${text}</div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div.querySelector('.bubble');
  }

  function addTyping() {
    const container = document.getElementById('chat-container');
    const div = document.createElement('div');
    div.className = 'message bot';
    div.id = 'typing-msg';
    div.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble">
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      </div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  async function sendMessage(e) {
    e.preventDefault();
    const input = document.getElementById('user-input');
    const message = input.value.trim();
    if (!message) return;

    const currentApiKey = '';

    input.value = '';
    input.style.height = '48px';

    addMessage('user', escapeHtml(message));

    const sendBtn = document.getElementById('send-btn');
    sendBtn.disabled = true;

    const typingEl = addTyping();

    try {
      const response = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, api_key: currentApiKey })
      });

      if (!response.ok) {
        const err = await response.json();
        typingEl.remove();
        addMessage('bot', '⚠️ 오류: ' + (err.error || '알 수 없는 오류'));
        return;
      }

      typingEl.remove();
      const botBubble = addMessage('bot', '');
      botBubble.innerHTML = '';

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let fullText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        const lines = chunk.split('\n');
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            const data = line.slice(6);
            if (data === '[DONE]') break;
            fullText += data.replace(/\\n/g, '\n');
            botBubble.innerHTML = marked(fullText);
            document.getElementById('chat-container').scrollTop = 99999;
          }
        }
      }

    } catch (err) {
      typingEl.remove();
      addMessage('bot', '⚠️ 연결 오류가 발생했습니다. 서버를 확인해주세요.');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // 간단한 마크다운 렌더러
  function marked(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>')
      .replace(/^#{1,3}\s(.+)$/gm, '<strong>$1</strong><br>');
  }
</script>

</body>
</html>
